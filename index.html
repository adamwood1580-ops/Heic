<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>HEIC → JPG (Batch)</title>
    <style>
      :root { color-scheme: light dark; }
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; max-width: 880px; margin: 40px auto; padding: 0 16px; }
      h1 { margin: 0 0 8px; }
      .card { border: 1px solid rgba(128,128,128,.35); border-radius: 14px; padding: 18px; }
      .drop { border: 2px dashed rgba(128,128,128,.6); border-radius: 14px; padding: 22px; text-align: center; }
      .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 12px; }
      button { padding: 10px 14px; border-radius: 10px; border: 1px solid rgba(128,128,128,.45); background: transparent; cursor: pointer; }
      button:disabled { opacity: .5; cursor: not-allowed; }
      input[type="file"] { max-width: 100%; }
      progress { width: 320px; max-width: 100%; }
      #list { margin-top: 12px; font-size: 14px; white-space: pre-wrap; }
      .muted { opacity: .75; font-size: 14px; }
      .pill { display:inline-block; padding: 2px 8px; border-radius: 999px; border: 1px solid rgba(128,128,128,.45); font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>HEIC → JPG (Batch)</h1>
    <div class="muted">Runs locally in your browser. No uploads. Exports a ZIP of JPGs.</div>

    <div class="card" style="margin-top:16px;">
      <div class="drop" id="drop">
        <div style="font-size:16px; margin-bottom:10px;">
          Drag & drop HEIC files here <span class="pill">or</span> choose files
        </div>

        <input id="picker" type="file" accept=".heic,.heif,image/heic,image/heif" multiple />

        <div class="row" style="justify-content:center;">
          <label>
            JPEG quality:
            <strong id="qLabel">0.9</strong>
          </label>
          <input id="quality" type="range" min="0.5" max="1" step="0.05" value="0.9" />
        </div>

        <div class="row" style="justify-content:center;">
          <button id="convert" disabled>Convert & Download ZIP</button>
          <progress id="prog" value="0" max="1"></progress>
          <span id="status" class="muted"></span>
        </div>
      </div>

      <div id="list"></div>
    </div>

    <!-- Libraries -->
    <!-- Updated: use heic-to instead of heic2any -->
    <script src="https://cdn.jsdelivr.net/npm/heic-to@1.4.2/dist/iife/heic-to.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

    <script>
      const picker = document.getElementById("picker");
      const drop = document.getElementById("drop");
      const convertBtn = document.getElementById("convert");
      const prog = document.getElementById("prog");
      const statusEl = document.getElementById("status");
      const listEl = document.getElementById("list");
      const qualityEl = document.getElementById("quality");
      const qLabel = document.getElementById("qLabel");

      let heicFiles = [];

      qualityEl.addEventListener("input", () => (qLabel.textContent = qualityEl.value));

      function showList(lines) {
        listEl.textContent = lines.join("\n");
      }

      function setFiles(fileList) {
        const all = Array.from(fileList || []);
        heicFiles = all.filter(f => {
          const name = (f.name || "").toLowerCase();
          const type = (f.type || "").toLowerCase();
          return name.endsWith(".heic") || name.endsWith(".heif") || type.includes("heic") || type.includes("heif");
        });

        convertBtn.disabled = heicFiles.length === 0;
        prog.value = 0;
        prog.max = Math.max(1, heicFiles.length);
        statusEl.textContent = heicFiles.length ? `${heicFiles.length} file(s) ready` : "";
        showList(
          heicFiles.length
            ? ["Selected:", ...heicFiles.map(f => `• ${f.name}`)]
            : ["Select or drop HEIC files to begin."]
        );
      }

      picker.addEventListener("change", e => setFiles(e.target.files));

      // Drag & drop
      ["dragenter", "dragover"].forEach(evt =>
        drop.addEventListener(evt, e => {
          e.preventDefault(); e.stopPropagation();
          drop.style.borderColor = "rgba(0,0,0,.8)";
        })
      );
      ["dragleave", "drop"].forEach(evt =>
        drop.addEventListener(evt, e => {
          e.preventDefault(); e.stopPropagation();
          drop.style.borderColor = "rgba(128,128,128,.6)";
        })
      );
      drop.addEventListener("drop", e => setFiles(e.dataTransfer.files));

      // Some browsers need a canvas round-trip to ensure we truly have JPEG
      async function forceJpeg(blob, quality) {
        if (blob && blob.type === "image/jpeg") return blob;

        const img = new Image();
        const url = URL.createObjectURL(blob);
        try {
          await new Promise((res, rej) => {
            img.onload = () => res();
            img.onerror = rej;
            img.src = url;
          });
          const canvas = document.createElement("canvas");
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0);
          return await new Promise(res => canvas.toBlob(res, "image/jpeg", quality));
        } finally {
          URL.revokeObjectURL(url);
        }
      }

      function downloadBlob(blob, filename) {
        const a = document.createElement("a");
        const url = URL.createObjectURL(blob);
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }

      // Helper: convert one HEIC/HEIF file -> JPEG Blob using heic-to
      async function heicFileToJpegBlob(file, quality) {
        if (!window.HeicTo) {
          throw new Error("Converter library (HeicTo) not loaded");
        }

        // heic-to provides a quick detector; if it can't detect, we'll still attempt conversion
        try {
          const isHeic = await HeicTo.isHeic(file);
          if (!isHeic) throw new Error("Not detected as HEIC/HEIF");
        } catch (_) {
          // ignore detection errors and try conversion anyway
        }

        // Convert to JPEG
        const outBlob = await HeicTo({
          blob: file,
          type: "image/jpeg",
          quality: quality
        });

        // Ensure we end up with a proper JPEG blob everywhere
        return await forceJpeg(outBlob, quality);
      }

      convertBtn.addEventListener("click", async () => {
        if (!heicFiles.length) return;

        convertBtn.disabled = true;
        statusEl.textContent = "Converting…";
        const q = parseFloat(qualityEl.value);

        const zip = new JSZip();
        const lines = ["Converting:"];

        for (let i = 0; i < heicFiles.length; i++) {
          const f = heicFiles[i];
          prog.value = i + 1;

          try {
            const jpegBlob = await heicFileToJpegBlob(f, q);

            const base = (f.name || `image_${i+1}`).replace(/\.(heic|heif)$/i, "");
            zip.file(`${base}.jpg`, jpegBlob);

            lines.push(`✓ ${f.name} → ${base}.jpg`);
          } catch (err) {
            const msg = (err && err.message) ? err.message : String(err);
            lines.push(`✗ ${f.name} (failed: ${msg})`);
          }

          showList(lines);
        }

        statusEl.textContent = "Creating ZIP…";
        const zipBlob = await zip.generateAsync({ type: "blob" });
        downloadBlob(zipBlob, "converted_jpgs.zip");

        statusEl.textContent = "Done";
        convertBtn.disabled = false;
      });
    </script>
  </body>
</html>
